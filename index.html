<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex items-center justify-center">

  <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700 text-center mx-4">
    <h2 class="text-2xl font-bold mb-2">Secure Gateway</h2>
    <p class="text-sm text-slate-400 mb-8">Connect your wallet to review and authorize the pending transaction payload.</p>

    <!-- CUSTOM WALLET CONNECTION BUTTON -->
    <div id="btn-container" class="flex justify-center mb-6">
      <button id="custom-connect-btn" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-[0.98] transition-all text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-blue-600/20 cursor-pointer">
        Connect Wallet
      </button>
    </div>

    <div id="action-area" class="hidden border-t border-slate-700 pt-6 mt-6">
      <div class="bg-slate-900/50 p-4 rounded-xl mb-6 text-left border border-slate-700/50">
        <span class="text-xs font-semibold text-emerald-400 uppercase tracking-wider">Preloaded Transaction</span>
        <div class="flex justify-between items-center mt-2">
          <span class="text-slate-300 font-medium">Amount:</span>
          <span class="text-xl font-bold text-white">0.05 ETH</span>
        </div>
        <div class="mt-2 text-xs text-slate-400 truncate">
          <span class="font-medium text-slate-300">To:</span> 0x742d35Cc6634C0532925a3b844Bc454e4438f44e
        </div>
      </div>

      <button id="send-tx-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-[0.98] transition-all text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/20 cursor-pointer">
        Confirm & Send Transaction
      </button>
      
      <p id="status-message" class="text-xs text-slate-400 mt-4 text-center min-h-[1rem]"></p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>

  <script type="module">
    // FIXED CDN CHUNKING ERRORS BY ROUTING VIA ESM.SH
    import { createAppKit } from 'https://esm.sh/@reown/appkit';
    import { EthersAdapter } from 'https://esm.sh/@reown/appkit-adapter-ethers';
    import { mainnet } from 'https://esm.sh/@reown/appkit/networks';

    const projectId = 'cba904b6423fea5fef3838e023c0e8e4'; 

    const metadata = {
      name: 'Transaction Portal',
      description: 'Review your preloaded transfer',
      url: window.location.origin,
      icons: ['https://avatars.githubusercontent.com/u/179229932']
    };

    // Initialize AppKit
    const modal = createAppKit({
      adapters: [new EthersAdapter()],
      networks: [mainnet],
      metadata,
      projectId,
      features: {
        analytics: false
      }
    });

    // UI References
    const customConnectBtn = document.getElementById('custom-connect-btn');
    const actionArea = document.getElementById('action-area');
    const sendTxBtn = document.getElementById('send-tx-btn');
    const statusMessage = document.getElementById('status-message');

    // TRIGGER POPUP ON CLICK
    customConnectBtn.addEventListener('click', () => {
      modal.open();
    });

    // LISTEN FOR CONNECTION CHANGES
    modal.subscribeAccount(state => {
      if (state.isConnected) {
        customConnectBtn.textContent = "Wallet Connected ✅";
        customConnectBtn.classList.remove('bg-blue-600', 'hover:bg-blue-700');
        customConnectBtn.classList.add('bg-slate-700', 'cursor-not-allowed', 'pointer-events-none');
        actionArea.classList.remove('hidden');
      } else {
        customConnectBtn.textContent = "Connect Wallet";
        customConnectBtn.classList.remove('bg-slate-700', 'cursor-not-allowed', 'pointer-events-none');
        customConnectBtn.classList.add('bg-blue-600', 'hover:bg-blue-700');
        actionArea.classList.add('hidden');
      }
    });

    // Execute Preloaded Transaction Payload
    sendTxBtn.addEventListener('click', async () => {
      statusMessage.textContent = "Checking wallet connection...";
      statusMessage.className = "text-xs text-amber-400 mt-4 text-center";

      try {
        const providers = modal.getProviders();
        const walletProvider = providers['eip155'];

        if (!walletProvider) {
          statusMessage.textContent = "Error: Wallet session missing. Try reconnecting.";
          statusMessage.className = "text-xs text-red-400 mt-4 text-center";
          return;
        }

        const ethersProvider = new ethers.BrowserProvider(walletProvider);
        const signer = await ethersProvider.getSigner();

        statusMessage.textContent = "Forwarding payload to Trust Wallet...";

        const txPayload = {
          to: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e", 
          value: ethers.parseEther("0.05")                
        };

        const txResponse = await signer.sendTransaction(txPayload);
        
        statusMessage.textContent = "Transaction Broadcasted! Awaiting confirmation...";
        statusMessage.className = "text-xs text-blue-400 mt-4 text-center";

        const receipt = await txResponse.wait();
        
        statusMessage.textContent = `Success! Tx Hash: ${receipt.hash.substring(0, 10)}...`;
        statusMessage.className = "text-xs text-emerald-400 mt-4 text-center";

      } catch (error) {
        console.error(error);
        if (error.message && error.message.includes("rejected")) {
          statusMessage.textContent = "Transaction canceled or rejected inside the app.";
        } else {
          statusMessage.textContent = "An error occurred handling the transaction request.";
        }
        statusMessage.className = "text-xs text-red-400 mt-4 text-center";
      }
    });
  </script>
</body>
</html>
